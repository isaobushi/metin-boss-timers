name: release-windows

# Builds the Microsoft Store MSIX in CI only — the dev machine is macOS, so the
# Windows artifact never exists on a laptop. Provenance is therefore tied to
# public source: a tagged commit on GitHub -> this workflow run -> the artifact.
#
# Store-only channel (#10): this workflow no longer publishes free .exe/.msi
# installers to GitHub Releases. It packs a .msix and uploads it as a CI
# artifact; a human downloads it and submits it to Partner Center, where
# Microsoft re-signs it for the Store (so there is no cert to buy).
#
# Cut a release by tagging a commit whose version matches src-tauri/tauri.conf.json
# (the source of truth), e.g.  git tag v0.4.0 && git push origin v0.4.0
#
# Partner Center identity values are supplied via repo variables
# (MSIX_IDENTITY_NAME / MSIX_PUBLISHER / MSIX_PUBLISHER_DISPLAY_NAME); until
# those are set they fall back to dev placeholders so the workflow stays green.
# See src-tauri/msix/README.md.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # provenance attestation (OIDC)
  attestations: write # provenance attestation

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # Runs beforeBuildCommand (tsc + vite build) then compiles the Rust binary.
      # --no-bundle: we package the raw binary into an MSIX ourselves, so we
      # don't need the NSIS/WiX bundlers.
      - name: Build release binary
        run: npx tauri build --no-bundle

      - name: Pack MSIX
        id: pack
        shell: pwsh
        env:
          MSIX_IDENTITY_NAME: ${{ vars.MSIX_IDENTITY_NAME }}
          MSIX_PUBLISHER: ${{ vars.MSIX_PUBLISHER }}
          MSIX_PUBLISHER_DISPLAY_NAME: ${{ vars.MSIX_PUBLISHER_DISPLAY_NAME }}
        run: |
          $ErrorActionPreference = "Stop"

          # version (source of truth: tauri.conf.json) -> 4-part MSIX version
          $ver = (node -p "require('./src-tauri/tauri.conf.json').version").Trim()
          $parts = @($ver.Split('.'))
          while ($parts.Count -lt 4) { $parts += '0' }
          $msixVersion = ($parts[0..3] -join '.')
          Write-Host "version=$ver -> msix=$msixVersion"

          # identity (repo variables, with dev placeholders when unset)
          $identityName  = if ($env:MSIX_IDENTITY_NAME)          { $env:MSIX_IDENTITY_NAME }          else { "DungeonAid.Dev" }
          $publisher     = if ($env:MSIX_PUBLISHER)              { $env:MSIX_PUBLISHER }              else { "CN=DungeonAid-Dev-Placeholder" }
          $publisherName = if ($env:MSIX_PUBLISHER_DISPLAY_NAME) { $env:MSIX_PUBLISHER_DISPLAY_NAME } else { "isaobushi" }
          Write-Host "identity=$identityName publisher=$publisher"

          # locate the built binary (non-recursive; ignores build-script exes)
          $exe = Get-ChildItem "src-tauri/target/release/*.exe" -File |
            Where-Object { $_.Name -notmatch 'build|setup|installer' } |
            Select-Object -First 1
          if (-not $exe) { throw "no release binary found in src-tauri/target/release" }
          Write-Host "binary: $($exe.FullName)"

          # lay out the package directory
          $layout = "msix-layout"
          Remove-Item $layout -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path "$layout/Assets" | Out-Null
          Copy-Item $exe.FullName "$layout/DungeonAid.exe"
          foreach ($asset in "StoreLogo","Square150x150Logo","Square44x44Logo","Square71x71Logo","Square310x310Logo") {
            Copy-Item "src-tauri/icons/$asset.png" "$layout/Assets/$asset.png"
          }

          # manifest from template
          $manifest = Get-Content "src-tauri/msix/AppxManifest.template.xml" -Raw
          $manifest = $manifest.Replace("__IDENTITY_NAME__", $identityName).
                                Replace("__PUBLISHER__", $publisher).
                                Replace("__PUBLISHER_DISPLAY_NAME__", $publisherName).
                                Replace("__VERSION__", $msixVersion)
          Set-Content "$layout/AppxManifest.xml" $manifest -Encoding utf8

          # locate makeappx.exe (latest Windows SDK) and pack
          $makeappx = Get-ChildItem "C:/Program Files (x86)/Windows Kits/10/bin/*/x64/makeappx.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $makeappx) { throw "makeappx.exe not found" }
          Write-Host "makeappx: $($makeappx.FullName)"

          $out = "DungeonAid_${msixVersion}_x64.msix"
          & $makeappx.FullName pack /d $layout /p $out /o
          if ($LASTEXITCODE -ne 0) { throw "makeappx failed ($LASTEXITCODE)" }
          Write-Host "packed: $out"
          "msix=$out" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding ascii

      # Signed SLSA provenance for the MSIX: artifact -> run -> commit SHA. Kept
      # for transparency even though the .msix goes to Partner Center, not users.
      - uses: actions/attest-build-provenance@v1
        with:
          subject-path: ${{ steps.pack.outputs.msix }}

      - name: Checksums
        shell: pwsh
        run: |
          $msix = "${{ steps.pack.outputs.msix }}"
          ((Get-FileHash $msix -Algorithm SHA256).Hash.ToLower() + "  " + $msix) |
            Out-File -Encoding ascii SHA256SUMS.txt
          Get-Content SHA256SUMS.txt

      # The .msix is a CI artifact for Partner Center submission — NOT a public
      # GitHub release.
      - uses: actions/upload-artifact@v4
        with:
          name: dungeonaid-msix
          path: |
            ${{ steps.pack.outputs.msix }}
            SHA256SUMS.txt
          if-no-files-found: error
